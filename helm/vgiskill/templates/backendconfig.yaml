{{- if .Values.ingress.enabled -}}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ include "vgiskill.fullname" . }}-frappe-backendconfig
  labels:
    {{- include "vgiskill.labels" . | nindent 4 }}
spec:
  healthCheck:
    checkIntervalSec: 15
    port: 8000
    type: HTTP
    requestPath: /
{{- end }}
