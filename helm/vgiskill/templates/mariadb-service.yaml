{{- if .Values.mariadb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vgiskill.fullname" . }}-mariadb
  labels:
    {{- include "vgiskill.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "vgiskill.fullname" . }}-mariadb
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
{{- end }}
