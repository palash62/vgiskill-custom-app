apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vgiskill.fullname" . }}-redis
  labels:
    {{- include "vgiskill.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "vgiskill.fullname" . }}-redis
  template:
    metadata:
      labels:
        app: {{ include "vgiskill.fullname" . }}-redis
        {{- include "vgiskill.labels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: {{ .Values.redis.imagePullPolicy }}
          ports:
            - containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
